<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Two recipes</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Recipe",
        "name": "Fixture Soup",
        "recipeYield": "6 servings",
        "recipeIngredient": ["2 cups broth", "1 onion, diced"],
        "recipeInstructions": ["Simmer the broth.", "Add onion and cook."]
      },
      {
        "@type": "Recipe",
        "name": "Fixture Salad",
        "recipeYield": "2 servings",
        "recipeIngredient": ["1 head lettuce", "2 tablespoons olive oil"],
        "recipeInstructions": ["Wash lettuce.", "Dress with oil."]
      }
    ]
  }
  </script>
</head>
<body><h1>Two recipes on one page</h1></body>
</html>
